version: '3'

services:
  local_nginx:
    build: ./docker/nginx
    container_name: local_nginx
    restart: always
    ports:
      - 8080:80
    volumes:
      - ./src:/var/www/app
    depends_on:
      - local_php

  local_php:
    build: ./docker/php-fpm
    container_name: local_php
    volumes:
      - ./src:/var/www/app
    working_dir: /var/www/app
    depends_on:
      - local_mysql
      - local_redis
      - local_websocket

  local_mysql:
    image: mysql:5.7
    container_name: local_mysql
    restart: unless-stopped
    ports:
      - 33066:3306
    environment:
      MYSQL_DATABASE: local_db
      MYSQL_USER: local
      MYSL_PASSWORD: 11111111
      MYSQL_ROOT_PASSWORD: password

  local_redis:
    image: redis:latest
    container_name: local_redis
    ports:
      - 63799:6379

  local_websocket:
    image: mintopia/laravel-echo-server:latest
    container_name: local_websocket
    restart: on-failure
    ports:
      - 60011:6001
    depends_on:
      - local_redis
